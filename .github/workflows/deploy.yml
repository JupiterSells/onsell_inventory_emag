name: Build eMAG API

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - run: doctl registry login
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            registry.digitalocean.com/kstock/emag:latest
            registry.digitalocean.com/kstock/emag:${{ github.sha }}
          cache-from: type=registry,ref=registry.digitalocean.com/kstock/emag:buildcache
          cache-to: type=registry,ref=registry.digitalocean.com/kstock/emag:buildcache,mode=max
