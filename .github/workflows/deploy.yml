name: Build & Deploy eMAG API

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - run: doctl registry login
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            registry.digitalocean.com/kstock/emag:latest
            registry.digitalocean.com/kstock/emag:${{ github.sha }}
          cache-from: type=registry,ref=registry.digitalocean.com/kstock/emag:buildcache
          cache-to: type=registry,ref=registry.digitalocean.com/kstock/emag:buildcache,mode=max

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Discover tenants and deploy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          HOSTS=$(doctl compute droplet list --tag-name kstock --format PublicIPv4 --no-header 2>/dev/null | tr '\n' ' ')

          if [ -z "$HOSTS" ]; then
            echo "No active kstock droplets found."
            exit 0
          fi

          echo "Deploying to: $HOSTS"

          for HOST in $HOSTS; do
            echo ""
            echo "--- Deploying to $HOST ---"
            ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=10 root@"$HOST" << 'DEPLOY'
              set -e
              cd /root/kstock
              docker compose pull emag_api
              docker compose up -d emag_api
              echo "Deployed emag_api on $(hostname)"
          DEPLOY
          done
